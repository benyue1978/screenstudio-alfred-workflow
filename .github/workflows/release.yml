name: Release Workflow

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          version="$(zsh .github/scripts/release_version.sh)"
          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Validate Tag Trigger
        if: github.event_name == 'push'
        shell: bash
        run: zsh .github/scripts/validate_release_tag.sh "${GITHUB_REF_NAME}"

      - name: Create Release Tag For Manual Trigger
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally"
          elif git ls-remote --tags origin "$tag" | grep -q "$tag"; then
            git fetch --tags origin
            echo "Tag $tag already exists on origin"
          else
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Build Workflow Package
        shell: bash
        run: zsh workflow/build-workflow.sh

      - name: Create Or Update Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          artifact="workflow/Screen Studio.alfredworkflow"
          title="Screen Studio Alfred Workflow $tag"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$artifact" --clobber
          else
            gh release create "$tag" "$artifact" --title "$title" --generate-notes
          fi
